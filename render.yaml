services:
  - type: web
    name: oikonomia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 app.py
    disk:
      name: oikonomia-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: "10000"